<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SB Net</title>
    <script>
      // GitHub Pages SPA redirect — converts deep paths to query-encoded form
      // so index.html can restore them via history.replaceState.
      // e.g. /InventoryOS/tasks -> /InventoryOS/?/tasks
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
